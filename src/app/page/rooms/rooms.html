<div class="breadcumb-wrapper" data-bg-src="assets/img/bg/breadcumb-bg.jpg">
        <div class="container">
            <div class="breadcumb-content">
                <h1 class="breadcumb-title">Habitaciones</h1>
                <ul class="breadcumb-menu">
                    <li><a routerLink="/home">Inicio</a></li>
                    <li>Habitaciones</li>
                </ul>
            </div>
        </div>
    </div>
    <section class="space">
        <div class="container">
            <div class="th-sort-bar">
                <div class="row justify-content-between align-items-center">
                    <div class="col-md-4">
                        <div class="search-form-area">
                            <form class="search-form"><input type="text" placeholder="Search"> <button type="submit"><i
                                        class="fa-light fa-magnifying-glass"></i></button></form>
                        </div>
                    </div>
                    <div class="col-md-auto">
                        <div class="sorting-filter-wrap">
                            <div class="nav" role="tablist"><a class="active" href="destination.html#"
                                    id="tab-destination-grid" data-bs-toggle="tab" data-bs-target="#tab-grid" role="tab"
                                    aria-controls="tab-grid" aria-selected="true"><i class="fa-light fa-grid-2"></i></a>
                                <a href="destination.html#" id="tab-destination-list" data-bs-toggle="tab"
                                    data-bs-target="#tab-list" role="tab" aria-controls="tab-list" aria-selected="false"
                                    class=""><i class="fa-solid fa-list"></i></a></div>
                            <form class="woocommerce-ordering" method="get"><select name="orderby" class="orderby"
                                    aria-label="destination order">
                                    <option value="menu_order" selected="selected">Default Sorting</option>
                                    <option value="popularity">Sort by popularity</option>
                                    <option value="rating">Sort by average rating</option>
                                    <option value="date">Sort by latest</option>
                                    <option value="price">Sort by price: low to high</option>
                                    <option value="price-desc">Sort by price: high to low</option>
                                </select></form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-xxl-12 col-lg-12">
                    <div class="tab-content" id="nav-tabContent">
                        <div class="tab-pane fade active show" id="tab-grid" role="tabpanel"
                            aria-labelledby="tab-destination-grid">
                            <div class="row gy-30">
                                <div class="col-xxl-4 col-xl-6" *ngFor="let habitacion of RealtimeHabitacionesService.habitaciones$ | async">
                                    <div class="tour-box th-ani">
                                        <div class="tour-box_img global-img"><img [src]="'https://db.buckapi.site:8091/api/files/habitaciones_molinera/' + habitacion.id + '/' + habitacion.img[0]" [alt]="habitacion.name"
                                                alt="image"></div>
                                        <div class="tour-content">
                                            <h3 class="box-title"><a >{{ habitacion.name }}</a></h3>
                                           
                                            <h4 class="tour-box_price"><span class="currency">$ {{ habitacion.price_cop }}</span>/Noche</h4>
                                            <div class="tour-action"><span><i class="fa-light fa-eye"></i></span> 
                                                <a (click)="viewHabitacion(habitacion.id)" style="cursor: pointer"
                                                    class="th-btn style4 th-icon">Ver Habitación</a></div>
                                        </div>
                                    </div>
                                </div>
                               
                            </div>
                        </div>
                       
                    </div>
                    <div class="th-pagination text-center mt-60 mb-0">
                        <ul>
                            <li><a class="active" href="">1</a></li>
                            <li><a href="">2</a></li>
                            <li><a href="">3</a></li>
                            <li><a href="">4</a></li>
                            <li><a class="next-page" href="">Next <img
                                        src="assets/img/icon/arrow-right4.svg" alt=""></a></li>
                        </ul>
                    </div>
                </div>
              
            </div>
        </div>
    </section>
