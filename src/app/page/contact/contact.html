    <div class="container">
        <div class="breadcumb-content">
            <h1 class="breadcumb-title">Contáctanos</h1>
            <ul class="breadcumb-menu">
                <li><a href="/home">Inicio</a></li>
                <li>Contáctanos</li>
            </ul>
        </div>
    </div>
</div>
<div class="space">
    <div class="container">
        <div class="title-area text-center"><span class="sub-title">Contáctanos</span>
            <h2 class="sec-title">Información de Contacto</h2>
        </div>
        <div class="row gy-4 justify-content-center">
            <div class="col-xl-4 col-lg-6">
                <div class="about-contact-grid style2">
                    <div class="about-contact-icon"><img src="assets/img/icon/location-dot2.svg" alt=""></div>
                    <div class="about-contact-details">
                        <h6 class="box-title">Dirección</h6>
                        <p class="about-contact-details-text">Carrera 6, Capacho 5009, Táchira, Venezuela</p>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-6">
                <div class="about-contact-grid">
                    <div class="about-contact-icon"><img src="assets/img/icon/call.svg" alt=""></div>
                    <div class="about-contact-details">
                        <h6 class="box-title">Número de Teléfono</h6>
                        <p class="about-contact-details-text"><a href="tel:01234567890">+57 312 345 6789</a></p>
                        <p class="about-contact-details-text"><a href="tel:01234567890">+57 312 345 6789</a></p>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-6">
                <div class="about-contact-grid">
                    <div class="about-contact-icon"><img src="assets/img/icon/mail.svg" alt=""></div>
                    <div class="about-contact-details">
                        <h6 class="box-title">Correo Electrónico</h6>
                        <p class="about-contact-details-text"><a
                                href="mailto:mailinfo00@tourm.com">mailinfo00@tourm.com</a></p>
                        <p class="about-contact-details-text"><a
                                href="mailto:support24@tourm.com">support24@tourm.com</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="space-extra2-top space-extra2-bottom" data-bg-src="assets/img/bg/video_bg_1.jpg">
    <div class="container">
        <div class="row flex-row-reverse justify-content-center align-items-center">
            <div class="col-lg-6">
                <div class="video-box1">
                    <img src="assets/img/hero/hero_6_1.jpg" alt="Ubicación de Posada La Molinera"
                        style="width: 100%; height: 400px; object-fit: cover; border-radius: 10px;">
                </div>
            </div>
            <div class="col-lg-6">
                <div>
                    <form class="contact-form style2" (ngSubmit)="sendTourWhatsapp()" #tourForm="ngForm">
                        <h3 class="sec-title mb-30 text-capitalize">Contacto</h3>

                        <div class="row">
                            <div class="col-12 form-group">
                                <input type="text" class="form-control" name="name" [(ngModel)]="tourBooking.name"
                                    placeholder="Dinos tu nombre" required>
                                <img src="assets/img/icon/user.svg" alt="">
                            </div>

                            <div class="col-12 form-group">
                                <input type="email" class="form-control" name="email" [(ngModel)]="tourBooking.email"
                                    placeholder="Correo ">
                                <img src="assets/img/icon/mail.svg" alt="">
                            </div>

                            <div class="form-group col-12">
                                <select name="subject" [(ngModel)]="tourBooking.subject" class="form-select" required>
                                    <option value="" disabled selected>Seleccionar</option>
                                    <option value="Menu del día">Menu del día</option>
                                    <option value="Habitaciones">Habitaciones</option>
                                    <option value="Eventos">Eventos</option>
                                </select>
                            </div>

                            <div class="form-group col-12">
                                <textarea name="message" cols="30" rows="3" class="form-control"
                                    [(ngModel)]="tourBooking.message" placeholder="Your Message"></textarea>
                                <img src="assets/img/icon/chat.svg" alt="">
                            </div>

                            <div class="form-btn col-12 mt-24">
                                <button type="submit" class="th-btn style3" [disabled]="tourForm.invalid">
                                    Enviar mensaje
                                    <img src="assets/img/icon/plane.svg" alt="">
                                </button>
                            </div>
                        </div>

                        <p class="form-messages mb-0 mt-3"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="">
    <div class="container-fluid">
        <div class="contact-map style2"><iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3952.6673216699146!2d-72.31722392474332!3d7.8249917066718595!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e666a10de797bf5%3A0x82c12ec206b1f52b!2sPosada%20La%20Molinera!5e0!3m2!1ses!2sca!4v1776629336059!5m2!1ses!2sca"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
            <div class="contact-icon"><img src="assets/img/icon/location-dot3.svg" alt=""></div>
        </div>
    </div>
</div>
